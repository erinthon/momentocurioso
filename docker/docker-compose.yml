version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: momentocurioso-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: momentocurioso_dev
      MYSQL_USER: ${DB_USERNAME:-mcuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mcpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - momentocurioso-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  momentocurioso-net:
    driver: bridge
