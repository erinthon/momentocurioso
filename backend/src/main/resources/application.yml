spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: momentocurioso-backend
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

newsletter:
  token-secret: ${NEWSLETTER_TOKEN_SECRET:${app.jwt.secret}}
  mail:
    enabled: ${NEWSLETTER_MAIL_ENABLED:false}
    from: ${NEWSLETTER_FROM_EMAIL:contato@momentocurioso.ia.br}
    from-name: ${NEWSLETTER_FROM_NAME:Momento Curioso}
