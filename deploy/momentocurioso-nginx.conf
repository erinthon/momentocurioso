server {
    server_name momentocurioso.ia.br www.momentocurioso.ia.br;

    root /var/www/momentocurioso;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect HTTP real para URLs antigas divulgadas no X. O redirect Angular
    # continua como fallback local, mas crawlers sociais nao executam JavaScript.
    location = /posts {
        return 301 /blog/posts;
    }

    location ~ ^/posts/([a-z0-9-]+)$ {
        return 301 /blog/posts/$1;
    }

    # Artigos passam pelo Spring para receber HTML e metadados atualizados sem
    # exigir Node em runtime nem rebuild a cada publicacao.
    location ~ ^/blog/posts/([a-z0-9-]+)$ {
        rewrite ^/blog/posts/([a-z0-9-]+)$ /api/post-pages/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 /index.csr.html;
    }

    location / {
        try_files $uri $uri/ /index.csr.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/momentocurioso.ia.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/momentocurioso.ia.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.momentocurioso.ia.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = momentocurioso.ia.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 default_server;
    listen [::]:80 default_server;
    server_name momentocurioso.ia.br www.momentocurioso.ia.br;
    return 404; # managed by Certbot




}
